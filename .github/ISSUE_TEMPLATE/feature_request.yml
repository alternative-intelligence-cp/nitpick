---
name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What feature would you like? Why is it useful?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Syntax / API
      description: If applicable, show what the feature would look like in Aria code
      render: aria
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What workarounds or alternatives exist today?
