---
name: Compiler Crash
description: Report a compiler crash (segfault, assertion failure, ICE)
labels: ["bug", "crash"]
body:
  - type: textarea
    id: code
    attributes:
      label: Aria Source Code
      description: The minimal .aria file that causes the crash
      render: aria
    validations:
      required: true
  - type: textarea
    id: crash-output
    attributes:
      label: Crash Output
      description: Full terminal output including the crash trace
      render: text
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: "OS, ariac version (`ariac --version`), LLVM version"
      value: |
        - OS: 
        - ariac version: 
        - LLVM version: 
    validations:
      required: true
