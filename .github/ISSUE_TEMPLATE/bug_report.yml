---
name: Bug Report
description: Report a bug in the Aria compiler or tools
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Minimal Aria code or commands to reproduce the issue
      render: aria
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: "OS, ariac version (`ariac --version`), LLVM version"
      value: |
        - OS: 
        - ariac version: 
        - LLVM version: 
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Actual Output
      description: Error messages, compiler output, or crash logs
      render: text
