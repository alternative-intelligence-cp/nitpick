[package]
name = "aria-math"
version = "0.2.0"
authors = ["Aria Language Project"]
license = "MIT"
description = "Mathematical functions for Aria — trig, exponential, logarithm, rounding, and more via C libm"
keywords = ["math", "trig", "sin", "cos", "sqrt", "libm", "float"]
categories = ["math", "std-extensions"]

[dependencies]
# No Aria package dependencies.
# Runtime dependency: C libm (link with -lm / link_libraries = ["m"])

[build]
type = "library"
entry = "src/aria_math.aria"
link_libraries = ["m"]
