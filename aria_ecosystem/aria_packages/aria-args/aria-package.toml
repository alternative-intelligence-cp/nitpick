[package]
name = "aria-args"
version = "0.2.0"
authors = ["Aria Language Project"]
license = "MIT"
description = "CLI argument parsing for Aria — reads /proc/self/cmdline and provides flag/value query functions"
keywords = ["cli", "args", "argv", "command-line", "parsing"]
categories = ["utilities", "cli"]

[build]
type = "library"
entry = "src/aria_args.aria"
