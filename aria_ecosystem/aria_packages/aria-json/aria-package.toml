[package]
name = "aria-json"
version = "0.2.0"
authors = ["Aria Language Project"]
license = "MIT"
description = "JSON tokeniser for Aria — byte-level scanning with malloc/free for zero-copy token-type arrays"
keywords = ["json", "tokenizer", "parsing", "lexer"]
categories = ["parsing", "data-formats"]

[build]
type = "library"
entry = "src/aria_json.aria"
